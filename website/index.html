<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AudioStream — Live Metrics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f1117;
    color: #e2e8f0;
    font-family: 'SF Mono', 'Fira Code', monospace;
    min-height: 100vh;
    padding: 24px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }

  header h1 {
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: #f8fafc;
  }

  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ef4444;
    transition: background 0.4s;
  }
  .dot.live { background: #22c55e; animation: pulse 1.5s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  .status {
    font-size: 0.75rem;
    color: #64748b;
    margin-left: auto;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 20px;
  }

  .card {
    background: #1e2333;
    border: 1px solid #2d3452;
    border-radius: 12px;
    padding: 18px 20px;
  }

  .card .label {
    font-size: 0.68rem;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .card .value {
    font-size: 2rem;
    font-weight: 700;
    color: #f8fafc;
    line-height: 1;
  }

  .card .unit {
    font-size: 0.8rem;
    color: #64748b;
    margin-left: 4px;
  }

  .card.accent-green  { border-color: #22c55e44; }
  .card.accent-blue   { border-color: #3b82f644; }
  .card.accent-yellow { border-color: #eab30844; }
  .card.accent-red    { border-color: #ef444444; }

  /* ── Charts row ── */
  .charts {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .chart-card {
    background: #1e2333;
    border: 1px solid #2d3452;
    border-radius: 12px;
    padding: 18px 20px;
  }

  .chart-card h2 {
    font-size: 0.75rem;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
  }

  .chart-wrap { position: relative; height: 200px; }

  /* ── Buffer bar ── */
  .buf-track {
    background: #0f1117;
    border-radius: 6px;
    height: 20px;
    overflow: hidden;
    margin-top: 8px;
  }

  .buf-fill {
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #8b5cf6);
    border-radius: 6px;
    transition: width 0.5s ease;
    min-width: 2px;
  }

  .buf-label {
    font-size: 0.75rem;
    color: #64748b;
    margin-top: 6px;
  }

  /* ── Per-client table ── */
  .table-card {
    background: #1e2333;
    border: 1px solid #2d3452;
    border-radius: 12px;
    padding: 18px 20px;
  }

  .table-card h2 {
    font-size: 0.75rem;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
  }

  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th { color: #64748b; font-weight: 500; text-align: left; padding: 6px 10px; border-bottom: 1px solid #2d3452; }
  td { padding: 8px 10px; border-bottom: 1px solid #1a1f30; color: #cbd5e1; }
  tr:last-child td { border-bottom: none; }
  .no-clients { color: #475569; font-size: 0.8rem; padding: 12px 0; }

  /* ── Loss gauge ── */
  .gauge-wrap { position: relative; height: 200px; display: flex; align-items: center; justify-content: center; }
  .gauge-center {
    position: absolute;
    text-align: center;
    top: 50%; left: 50%;
    transform: translate(-50%, -40%);
  }
  .gauge-center .pct { font-size: 1.8rem; font-weight: 700; }
  .gauge-center .lbl { font-size: 0.7rem; color: #64748b; }
</style>
</head>
<body>

<header>
  <div class="dot" id="dot"></div>
  <h1>🎵 AudioStream — Live Metrics</h1>
  <span class="status" id="status">Connecting…</span>
</header>

<!-- Stat cards -->
<div class="grid">
  <div class="card accent-blue">
    <div class="label">Avg Latency</div>
    <div class="value" id="lat-avg">—<span class="unit">ms</span></div>
  </div>
  <div class="card accent-green">
    <div class="label">Packets Recv</div>
    <div class="value" id="pkts-recv">—</div>
  </div>
  <div class="card accent-yellow">
    <div class="label">Packets Sent</div>
    <div class="value" id="pkts-sent">—</div>
  </div>
  <div class="card accent-red">
    <div class="label">Packets Lost</div>
    <div class="value" id="pkts-lost">—</div>
  </div>
</div>

<!-- Charts -->
<div class="charts">
  <!-- Latency line chart -->
  <div class="chart-card">
    <h2>Latency over time</h2>
    <div class="chart-wrap">
      <canvas id="latency-chart"></canvas>
    </div>
  </div>

  <!-- Loss gauge -->
  <div class="chart-card">
    <h2>Packet loss</h2>
    <div class="gauge-wrap">
      <canvas id="loss-chart"></canvas>
      <div class="gauge-center">
        <div class="pct" id="loss-pct">—</div>
        <div class="lbl">loss %</div>
      </div>
    </div>
  </div>
</div>

<!-- Buffer + clients -->
<div class="charts">
  <div class="chart-card">
    <h2>Jitter Buffer Fill</h2>
    <div class="buf-track">
      <div class="buf-fill" id="buf-fill" style="width:0%"></div>
    </div>
    <div class="buf-label" id="buf-label">— / — chunks</div>

    <h2 style="margin-top:24px">Latency breakdown</h2>
    <div class="chart-wrap" style="height:140px; margin-top:8px">
      <canvas id="lat-breakdown"></canvas>
    </div>
  </div>

  <div class="table-card">
    <h2>Connected Clients</h2>
    <table id="client-table">
      <thead>
        <tr><th>IP Address</th><th>Packets</th></tr>
      </thead>
      <tbody id="client-tbody">
        <tr><td colspan="2" class="no-clients">No clients connected</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
// ── Chart setup ────────────────────────────────────────────
const MAX_POINTS = 60;
const labels = [];

const latencyChart = new Chart(document.getElementById('latency-chart'), {
  type: 'line',
  data: {
    labels,
    datasets: [
      { label: 'min',  data: [], borderColor: '#22c55e', backgroundColor: 'transparent', pointRadius: 0, tension: 0.3 },
      { label: 'avg',  data: [], borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.08)', fill: true, pointRadius: 0, tension: 0.3 },
      { label: 'p95',  data: [], borderColor: '#f59e0b', backgroundColor: 'transparent', pointRadius: 0, tension: 0.3, borderDash: [4,3] },
      { label: 'max',  data: [], borderColor: '#ef4444', backgroundColor: 'transparent', pointRadius: 0, tension: 0.3, borderDash: [2,4] },
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    animation: { duration: 300 },
    plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 } } } },
    scales: {
      x: { ticks: { color: '#475569', maxTicksLimit: 8 }, grid: { color: '#1e2333' } },
      y: { ticks: { color: '#475569', callback: v => v + 'ms' }, grid: { color: '#2d3452' }, beginAtZero: true }
    }
  }
});

// Loss doughnut
const lossChart = new Chart(document.getElementById('loss-chart'), {
  type: 'doughnut',
  data: {
    datasets: [{
      data: [0, 100],
      backgroundColor: ['#ef4444', '#1e2333'],
      borderWidth: 0,
      circumference: 270,
      rotation: -135,
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    cutout: '78%',
    plugins: { legend: { display: false }, tooltip: { enabled: false } },
    animation: { duration: 400 }
  }
});

// Latency breakdown bar
const latBreakdown = new Chart(document.getElementById('lat-breakdown'), {
  type: 'bar',
  data: {
    labels: ['min', 'avg', 'p95', 'max'],
    datasets: [{
      data: [0, 0, 0, 0],
      backgroundColor: ['#22c55e', '#3b82f6', '#f59e0b', '#ef4444'],
      borderRadius: 4,
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: '#475569' }, grid: { display: false } },
      y: { ticks: { color: '#475569', callback: v => v + 'ms' }, grid: { color: '#2d3452' }, beginAtZero: true }
    },
    animation: { duration: 300 }
  }
});

// ── WebSocket ────────────────────────────────────────────
const WS_URL = `ws://${location.hostname}:9002`;
let ws, reconnectTimer;

function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    document.getElementById('dot').classList.add('live');
    document.getElementById('status').textContent = 'Live';
    clearTimeout(reconnectTimer);
  };

  ws.onclose = () => {
    document.getElementById('dot').classList.remove('live');
    document.getElementById('status').textContent = 'Reconnecting…';
    reconnectTimer = setTimeout(connect, 2000);
  };

  ws.onmessage = ({ data }) => {
    const d = JSON.parse(data);
    update(d);
  };
}

function update(d) {
  const now = new Date().toLocaleTimeString();

  // Stat cards
  document.getElementById('lat-avg').innerHTML   = d.lat_avg + '<span class="unit">ms</span>';
  document.getElementById('pkts-recv').textContent = fmt(d.recv);
  document.getElementById('pkts-sent').textContent = fmt(d.sent);
  document.getElementById('pkts-lost').textContent = fmt(d.lost);

  // Latency chart
  labels.push(now);
  latencyChart.data.datasets[0].data.push(d.lat_min);
  latencyChart.data.datasets[1].data.push(d.lat_avg);
  latencyChart.data.datasets[2].data.push(d.lat_p95);
  latencyChart.data.datasets[3].data.push(d.lat_max);
  if (labels.length > MAX_POINTS) {
    labels.shift();
    latencyChart.data.datasets.forEach(ds => ds.data.shift());
  }
  latencyChart.update();

  // Loss gauge
  const loss = Math.min(100, Math.max(0, d.loss_pct));
  lossChart.data.datasets[0].data = [loss, 100 - loss];
  lossChart.data.datasets[0].backgroundColor[0] = loss > 5 ? '#ef4444' : loss > 1 ? '#f59e0b' : '#22c55e';
  lossChart.update();
  document.getElementById('loss-pct').textContent = loss.toFixed(1) + '%';
  document.getElementById('loss-pct').style.color = loss > 5 ? '#ef4444' : loss > 1 ? '#f59e0b' : '#22c55e';

  // Buffer fill
  const pct = d.buf_cap > 0 ? (d.buf_fill / d.buf_cap * 100) : 0;
  document.getElementById('buf-fill').style.width = pct + '%';
  document.getElementById('buf-label').textContent = `${d.buf_fill} / ${d.buf_cap} chunks (${pct.toFixed(0)}%)`;

  // Latency breakdown bar
  latBreakdown.data.datasets[0].data = [d.lat_min, d.lat_avg, d.lat_p95, d.lat_max];
  latBreakdown.update();

  // Client table
  const tbody = document.getElementById('client-tbody');
  if (!d.clients || d.clients.length === 0) {
    tbody.innerHTML = '<tr><td colspan="2" class="no-clients">No clients connected</td></tr>';
  } else {
    tbody.innerHTML = d.clients.map(c =>
      `<tr><td>${c.ip}</td><td>${fmt(c.pkts)}</td></tr>`
    ).join('');
  }
}

function fmt(n) {
  return n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'K' : String(n);
}

connect();
</script>
</body>
</html>
